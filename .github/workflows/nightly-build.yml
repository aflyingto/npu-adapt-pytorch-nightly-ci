name: Nightly Build

on:
  schedule:
    - cron: '0 2 * * *'  # UTC 02:00 (Beijing 10:00)
  workflow_dispatch:
    inputs:
      pytorch_date:
        description: 'PyTorch nightly date (YYYYMMDD), leave empty for latest'
        required: false
        type: string
  push:
    paths:
      - '.github/workflows/nightly-build.yml'
      - 'patches/**'
      - 'AGENTS.md'

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-v1
          restore-keys: |
            ccache-${{ runner.os }}-
      
      - name: Install PyTorch Nightly
        run: |
          PYTORCH_DATE="${{ inputs.pytorch_date }}"
          if [ -n "$PYTORCH_DATE" ]; then
            pip install --pre torch==2.9.0.dev${PYTORCH_DATE} --index-url https://download.pytorch.org/whl/nightly/cpu
          else
            pip install --pre torch --index-url https://download.pytorch.org/whl/nightly/cpu
          fi
          python -c "import torch; print(f'PyTorch version: {torch.__version__}')"
          echo "PYTORCH_VERSION=$(python -c 'import torch; print(torch.__version__)')" >> $GITHUB_OUTPUT
        id: pytorch
      
      - name: Clone Ascend/pytorch
        run: |
          git clone --recursive https://github.com/Ascend/pytorch.git ascend_pytorch
          cd ascend_pytorch
          echo "ASCEND_COMMIT=$(git rev-parse HEAD)" >>.gitinfo
          echo "ASCEND_COMMIT=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
        id: ascend
      
      - name: Apply patches
        run: |
          PATCHES_DIR="${{ github.workspace }}/patches"
          if [ -d "$PATCHES_DIR" ]; then
            for patch in $(ls -1v "$PATCHES_DIR"/*.patch 2>/dev/null); do
              echo "Applying patch: $(basename $patch)"
              if git apply --directory=ascend_pytorch "$patch"; then
                echo "  ✅ OK"
              else
                echo "  ❌ FAILED (may already be merged upstream)"
                exit 1
              fi
            done
          else
            echo "No patches directory found"
          fi
        id: patches
      
      - name: Build CANN stub libraries
        run: |
          cd ascend_pytorch/third_party/acl/libs
          bash build/build_stub.sh
      
      - name: Build torch_npu wheel
        run: |
          cd ascend_pytorch
          export CC="ccache gcc"
          export CXX="ccache g++"
          export CCACHE_DIR=~/.ccache
          export CCACHE_MAXSIZE=2G
          export DISABLE_INSTALL_TORCHAIR=FALSE
          
          python setup.py build bdist_wheel 2>&1 | tee build.log
          
          if [ -f build.log ]; then
            echo "Build log saved"
          fi
          
          if ls dist/*.whl 1> /dev/null 2>&1; then
            echo "BUILD_SUCCESS=true" >> $GITHUB_OUTPUT
            echo "WHEEL_FILE=$(ls dist/*.whl | head -1)" >> $GITHUB_OUTPUT
            echo "Build succeeded: $(ls dist/*.whl | head -1)"
          else
            echo "BUILD_SUCCESS=false" >> $GITHUB_OUTPUT
            echo "Build failed - no wheel file found"
            exit 1
          fi
        id: build
        continue-on-error: true
      
      - name: Save ccache
        if: always()
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-v1
          restore-keys: |
            ccache-${{ runner.os }}-
      
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ascend_pytorch/build.log
          retention-days: 7
      
      - name: Upload wheel
        if: steps.build.outputs.BUILD_SUCCESS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: torch-npu-wheel
          path: ${{ steps.build.outputs.WHEEL_FILE }}
          retention-days: 7
      
      - name: Build Summary
        if: always()
        run: |
          echo "# Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**PyTorch Version:** ${{ steps.pytorch.outputs.PYTORCH_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "**Ascend/pytorch Commit:** ${{ steps.ascend.outputs.ASCEND_COMMIT }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## Applied Patches" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.build.outputs.PATCHES }}" ]; then
            echo "${{ steps.build.outputs.PATCHES }}" | while read patch; do
              echo "- $patch" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "No patches applied" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## Build Result" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.build.outputs.BUILD_SUCCESS }}" = "true" ]; then
            echo "✅ **Build succeeded**" >> $GITHUB_STEP_SUMMARY
            echo "**Wheel:** $(basename ${{ steps.build.outputs.WHEEL_FILE }})" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Build failed**" >> $GITHUB_STEP_SUMMARY
            echo "Check the build-log artifact for details" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f ~/.ccache/ccache.conf ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## Ccache Status" >> $GITHUB_STEP_SUMMARY
            ccache -s | grep -E "cache hit|cache miss" >> $GITHUB_STEP_SUMMARY
          fi